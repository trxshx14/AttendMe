spring.application.name=AttendMe
server.port=8888

# Activate local profile (loads application-local.properties)
spring.profiles.active=local

# Database
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.peqeqyvchkazlmnoxwob
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase
supabase.url=https://peqeqyvchkazlmnoxwob.supabase.co
