# Application Name
spring.application.name=AttendMe

# Server Configuration
server.port=8888
# server.servlet.context-path=/api

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/attendme_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - ADD THESE LINES
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024AttendanceSystemMustBeLongEnough
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.attendme=DEBUG

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE